name: E2E Tests

on:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Cache VS Code test instance
        uses: actions/cache@v4
        with:
          path: .vscode-test
          key: vscode-test-${{ runner.os }}-${{ hashFiles('.vscode-test.mjs') }}
          restore-keys: |
            vscode-test-${{ runner.os }}-

      - name: Compile extension and tests
        run: yarn compile && yarn compile-tests

      - name: Create test-results directory
        run: mkdir -p test-results

      - name: Run e2e tests
        run: yarn test:e2e:ci
        env:
          CI: true

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7

      - name: Publish test report
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/e2e-results.xml
          check_name: E2E Test Results
          fail_on: nothing
